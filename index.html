<script>
    // 模擬生成 90 天的股票收盤價數據（完全免外部連線）
    function generateMockStockData(symbol) {
        let currentPrice;
        
        // 依據不同股票設定初始股價，讓資料看起來更真實
        switch(symbol.toUpperCase()) {
            case 'NVDA': currentPrice = 130; break;
            case 'INTC': currentPrice = 30; break;
            case 'AAPL': currentPrice = 180; break;
            case 'TSLA': currentPrice = 175; break;
            case 'ARM': currentPrice = 120; break;
            case 'AMZN': currentPrice = 185; break;
            case 'GOOG': currentPrice = 170; break;
            default: currentPrice = 100;
        }

        let prices = [];
        // 隨機漫步演算法生成 90 天歷史 K 線
        for (let i = 0; i < 90; i++) {
            let changePercent = (Math.random() - 0.49) * 0.04; // 稍微偏向多頭的隨機波動
            currentPrice = currentPrice * (1 + changePercent);
            prices.push(currentPrice);
        }
        return prices;
    }

    function calculateMA(data, period) {
        let ma = [];
        for (let i = 0; i < data.length; i++) {
            if (i < period - 1) {
                ma.push(null);
            } else {
                let sum = 0;
                for (let j = 0; j < period; j++) {
                    sum += data[i - j];
                }
                ma.push(sum / period);
            }
        }
        return ma;
    }

    async function queryStocks() {
        const input = document.getElementById("symbolsInput").value;
        const symbols = input.replace(/,/g, " ").split(/\s+/).filter(s => s.trim() !== "");
        const tbody = document.getElementById("resultsBody");
        
        if (symbols.length === 0) return;
        tbody.innerHTML = '<tr><td colspan="8">🔄 正在本地端動態生成與計算 5MA / 20MA 數據...</td></tr>';
        
        // 延遲 0.5 秒模擬加載動畫
        await new Promise(resolve => setTimeout(resolve, 500));
        
        let html = "";

        for (let symbol of symbols) {
            try {
                // 直接使用本地模擬數據生成器，跳過受阻擋的外部 API
                const closePrices = generateMockStockData(symbol);
                
                const ma5 = calculateMA(closePrices, 5);
                const ma20 = calculateMA(closePrices, 20);

                const len = closePrices.length;
                const currentPrice = closePrices[len - 1].toFixed(2);

                const today_ma5 = ma5[len - 1];
                const yesterday_ma5 = ma5[len - 2];
                const today_ma20 = ma20[len - 1];
                const yesterday_ma20 = ma20[len - 2];

                // 均線交叉訊號判斷
                let signal = "-";
                if (yesterday_ma5 <= yesterday_ma20 && today_ma5 > today_ma20) {
                    signal = '<span class="buy">BUY (黃金交叉)</span>';
                } else if (yesterday_ma5 >= yesterday_ma20 && today_ma5 < today_ma20) {
                    signal = '<span class="sell">SELL (死亡交叉)</span>';
                }

                // 近期交會警示
                let alert = "-";
                for (let i = 1; i <= 6; i++) {
                    let idx = len - i;
                    if (idx - 1 < 0) break;
                    if ((ma5[idx] > ma20[idx] && ma5[idx-1] <= ma20[idx-1]) || 
                        (ma5[idx] < ma20[idx] && ma5[idx-1] >= ma20[idx-1])) {
                        alert = '<span class="badge">近期有交會</span>';
                        break;
                    }
                }

                html += `
                    <tr>
                        <td><strong>${symbol.toUpperCase()}</strong></td>
                        <td>$${currentPrice}</td>
                        <td>${today_ma5.toFixed(2)}</td>
                        <td>${yesterday_ma5.toFixed(2)}</td>
                        <td>${today_ma20.toFixed(2)}</td>
                        <td>${yesterday_ma20.toFixed(2)}</td>
                        <td>${signal}</td>
                        <td>${alert}</td>
                    </tr>
                `;
            } catch (error) {
                html += `<tr><td><strong>${symbol.toUpperCase()}</strong></td><td colspan="7" style="color:#d32f2f;">⚠️ 計算錯誤: ${error.message}</td></tr>`;
            }
        }
        tbody.innerHTML = html;
    }
</script>
