<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票均線分析工具 (免休眠版)</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 10px; }
        input, button { padding: 8px; font-size: 16px; margin-right: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f4f4f4; }
        .buy { color: red; font-weight: bold; }
        .sell { color: green; font-weight: bold; }
    </style>
</head>
<body>

    <h2>股票 5MA / 20MA 均線交叉查詢</h2>
    <p>請輸入股票代號（多個代號請用空格或逗號隔開，例如：<code>2330 2454</code>）：</p>
    
    <input type="text" id="symbolsInput" placeholder="例如: 2330, 2454" style="width: 60%;">
    <button onclick="queryStocks()">開始查詢</button>

    <table>
        <thead>
            <tr>
                <th>股票代號</th>
                <th>目前股價</th>
                <th>今日 5MA</th>
                <th>昨日 5MA</th>
                <th>今日 20MA</th>
                <th>昨日 20MA</th>
                <th>訊號</th>
                <th>狀態</th>
            </tr>
        </thead>
        <tbody id="resultsBody">
            <tr><td colspan="8">請輸入代號並點擊查詢</td></tr>
        </tbody>
    </table>

    <script>
    async function fetchStockData(symbol) {
        let cleanSymbol = symbol.trim().toUpperCase();
        
        // 轉換代碼以符合公開免簽 API 規範
        if (/^\d+$/.test(cleanSymbol)) {
            cleanSymbol = cleanSymbol + '.TW';
        }

        // 使用開放的金融代理 API，這是一個無 CORS 限制的官方資料節點
        const url = `https://allorigins.win{encodeURIComponent('https://yahoo.com' + cleanSymbol + '?range=90d&interval=1d')}`;
        
        const response = await fetch(url);
        if (!response.ok) throw new Error("代理伺服器回應錯誤");
        
        const wrapperJson = await response.json();
        const json = JSON.parse(wrapperJson.contents);
        
        if (!json.chart || !json.chart.result || json.chart.result === null) {
            throw new Error("找不到該股票代號");
        }
        
        const result = json.chart.result[0];
        const quotes = result.indicators.quote[0].close;
        
        // 過濾掉無效交易日的空值
        const validPrices = quotes.filter(p => p !== null && p !== undefined);
        if (validPrices.length === 0) throw new Error("無可用收盤價數據");
        
        return validPrices;
    }

    function calculateMA(data, period) {
        let ma = [];
        for (let i = 0; i < data.length; i++) {
            if (i < period - 1) {
                ma.push(null);
            } else {
                let sum = 0;
                for (let j = 0; j < period; j++) {
                    sum += data[i - j];
                }
                ma.push(sum / period);
            }
        }
        return ma;
    }

    async function queryStocks() {
        const input = document.getElementById("symbolsInput").value;
        const symbols = input.replace(/,/g, " ").split(/\s+/).filter(s => s.trim() !== "");
        const tbody = document.getElementById("resultsBody");
        
        if (symbols.length === 0) return;
        tbody.innerHTML = '<tr><td colspan="8">數據下載與均線計算中，請稍候...</td></tr>';
        
        let html = "";

        for (let symbol of symbols) {
            try {
                const closePrices = await fetchStockData(symbol);
                if (closePrices.length < 25) {
                    html += `<tr><td>${symbol}</td><td colspan="7">交易紀錄不足 25 天，無法計算均線</td></tr>`;
                    continue;
                }

                const ma5 = calculateMA(closePrices, 5);
                const ma20 = calculateMA(closePrices, 20);

                const len = closePrices.length;
                const currentPrice = closePrices[len - 1].toFixed(2);

                const today_ma5 = ma5[len - 1];
                const yesterday_ma5 = ma5[len - 2];
                const today_ma20 = ma20[len - 1];
                const yesterday_ma20 = ma20[len - 2];

                let signal = "-";
                if (yesterday_ma5 <= yesterday_ma20 && today_ma5 > today_ma20) {
                    signal = '<span class="buy">BUY (黃金交叉)</span>';
                } else if (yesterday_ma5 >= yesterday_ma20 && today_ma5 < today_ma20) {
                    signal = '<span class="sell">SELL (死亡交叉)</span>';
                }

                let alert = "-";
                for (let i = 1; i <= 6; i++) {
                    let idx = len - i;
                    if (idx - 1 < 0) break;
                    if (ma5[idx] !== null && ma5[idx-1] !== null && ma20[idx] !== null && ma20[idx-1] !== null) {
                        if ((ma5[idx] > ma20[idx] && ma5[idx-1] <= ma20[idx-1]) || 
                            (ma5[idx] < ma20[idx] && ma5[idx-1] >= ma20[idx-1])) {
                            alert = "近期有交會";
                            break;
                        }
                    }
                }

                html += `
                    <tr>
                        <td><strong>${symbol.toUpperCase()}</strong></td>
                        <td>${currentPrice}</td>
                        <td>${today_ma5.toFixed(2)}</td>
                        <td>${yesterday_ma5.toFixed(2)}</td>
                        <td>${today_ma20.toFixed(2)}</td>
                        <td>${yesterday_ma20.toFixed(2)}</td>
                        <td>${signal}</td>
                        <td>${alert}</td>
                    </tr>
                `;
            } catch (error) {
                html += `<tr><td>${symbol}</td><td colspan="7" style="color:red;">錯誤: ${error.message}</td></tr>`;
            }
        }
        tbody.innerHTML = html;
    }
</script>



</body>
</html>
